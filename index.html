<!DOCTYPE html>
<html>
<head>
    <title>Bedwars Voxel Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #78a7ff; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; transform: translate(-50%, -50%);
            pointer-events: none; filter: invert(1);
        }
        #hotbar {
            position: absolute; bottom: 15px; left: 50%;
            transform: translateX(-50%); display: flex;
            background: rgba(0,0,0,0.4); padding: 4px; border: 2px solid #333;
        }
        .slot { width: 40px; height: 40px; border: 2px solid #555; margin: 2px; }
        .active { border-color: white; background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="hotbar"><div class="slot active"></div><div class="slot"></div><div class="slot"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. CORE GLOBALS ---
        let scene, camera, renderer, clock, player;
        let viewScene, viewCamera, handGroup;
        let keys = {}, yaw = 0, pitch = 0, handSwing = 0;
        const REACH = 3.5;

        // --- 2. PLAYER ENGINE ---
        class Player {
            constructor() {
                this.pos = new THREE.Vector3(0, 2, 0);
                this.vel = new THREE.Vector3();
                this.onGround = false;
            }
            update(dt) {
                let move = new THREE.Vector3();
                if (keys['KeyW']) move.z -= 1;
                if (keys['KeyS']) move.z += 1;
                if (keys['KeyA']) move.x -= 1;
                if (keys['KeyD']) move.x += 1;
                move.normalize().applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);

                this.vel.x = move.x * 4.5;
                this.vel.z = move.z * 4.5;
                this.vel.y -= 25 * dt;

                this.pos.add(this.vel.clone().multiplyScalar(dt));
                if (this.pos.y < 0) { this.pos.y = 0; this.vel.y = 0; this.onGround = true; }
                camera.position.copy(this.pos);
                camera.position.y += 1.6;
            }
        }

        // --- 3. THE "STEVE" MODEL (NPC) ---
        function spawnNPC(x, z, color) {
            const group = new THREE.Group();
            const m = (c) => new THREE.MeshLambertMaterial({ color: c, flatShading: true });

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), m(0xffcc88));
            head.position.y = 1.4;
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.2), m(color));
            body.position.y = 0.9;
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.6, 0.18), m(0x3333aa));
            lLeg.position.set(-0.1, 0.3, 0);
            const rLeg = lLeg.clone(); rLeg.position.x = 0.1;

            group.add(head, body, lLeg, rLeg);
            group.position.set(x, 0, z);
            scene.add(group);
        }

        // --- 4. INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x78a7ff);
            clock = new THREE.Clock();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(10, 20, 10);
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.4));

            viewScene = new THREE.Scene();
            viewCamera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 10);
            handGroup = new THREE.Group();
            const arm = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.7),
                new THREE.MeshLambertMaterial({ color: 0xffcc88 })
            );
            arm.position.set(0.4, -0.3, -0.6);
            arm.rotation.set(0.3, 0.1, 0);
            handGroup.add(arm);
            viewScene.add(handGroup, new THREE.AmbientLight(0xffffff, 1));

            player = new Player();

            for (let x = -10; x < 10; x++) {
                for (let z = -10; z < 10; z++) {
                    const block = new THREE.Mesh(
                        new THREE.BoxGeometry(1, 1, 1),
                        new THREE.MeshLambertMaterial({ color: 0x55aa55, flatShading: true })
                    );
                    block.position.set(x, -0.5, z);
                    scene.add(block);
                }
            }

            spawnNPC(3, -3, 0xff0000);

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if (e.code === 'Space' && player.onGround) {
                    player.vel.y = 8.5;
                    player.onGround = false;
                }
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                viewCamera.aspect = window.innerWidth / window.innerHeight;
                viewCamera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            document.addEventListener('mousemove', e => {
                if (document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY * 0.002));
                    camera.rotation.set(pitch, yaw, 0, 'YXZ');
                }
            });
            document.body.addEventListener('click', () => {
                document.body.requestPointerLock();
                handSwing = 1.0;
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            player.update(dt);

            if (handSwing > 0) {
                handSwing -= dt * 6;
                handGroup.rotation.x = -Math.sin(handSwing * Math.PI) * 1.0;
            }

            renderer.autoClear = true;
            renderer.render(scene, camera);
            renderer.autoClear = false;
            renderer.clearDepth();
            renderer.render(viewScene, viewCamera);
        }

        init();
    </script>
</body>
</html>
