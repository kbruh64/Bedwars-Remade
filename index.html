<!DOCTYPE html>
<html>
<head>
    <title>Bedwars Clone</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px;
        }
        .slot { width: 40px; height: 40px; border: 2px solid #555; }
        .selected { border-color: white; }
    </style>
</head>
<body>
    <img id="crosshair" src="https://i.imgur.com/8f1fL6v.png" alt="+">
    <div id="ui">
        <div class="slot selected"></div>
        <div class="slot"></div>
        <div class="slot"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- CONFIG & GLOBALS ---
        const REACH = 3.5;
        const GRAVITY = -24;
        const JUMP_FORCE = 8.5;

        let scene, camera, renderer, player, clock;
        let viewScene, viewCamera, handGroup;
        let keys = {};
        let yaw = 0, pitch = 0;
        let handSwing = 0;
        let blocks = [];

        // --- PLAYER CLASS ---
        class Player {
            constructor() {
                this.pos = new THREE.Vector3(0, 5, 0);
                this.vel = new THREE.Vector3();
                this.onGround = false;
            }

            update(dt) {
                // Movement Logic
                let move = new THREE.Vector3();
                if (keys['KeyW']) move.z -= 1;
                if (keys['KeyS']) move.z += 1;
                if (keys['KeyA']) move.x -= 1;
                if (keys['KeyD']) move.x += 1;
                move.normalize().applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);

                this.vel.x = move.x * 5;
                this.vel.z = move.z * 5;

                // Gravity
                this.vel.y += GRAVITY * dt;
                this.pos.add(this.vel.clone().multiplyScalar(dt));

                // Floor Collision (Basic)
                if (this.pos.y < 0) {
                    this.pos.y = 0; this.vel.y = 0; this.onGround = true;
                }

                camera.position.copy(this.pos);
                camera.position.y += 1.6;
            }
        }

        // --- MODEL FACTORY ---
        function createNPC(x, y, z, color) {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const skin = new THREE.MeshLambertMaterial({ color: 0xffcc88 });

            // Minecraft Proportions (Pixels / 16)
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skin);
            head.position.y = 1.5;

            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.75, 0.25), mat);
            torso.position.y = 0.875;

            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.75, 0.25), skin);
            arm.position.set(0.375, 0.875, 0);

            group.add(head, torso, arm);
            group.position.set(x, y, z);
            scene.add(group);
        }

        // --- INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 7.5);
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.5));

            // Viewmodel Scene (The Hand)
            viewScene = new THREE.Scene();
            viewCamera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10);
            handGroup = new THREE.Group();
            const hand = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.7),
                new THREE.MeshLambertMaterial({ color: 0xffcc88 })
            );
            hand.position.set(0.4, -0.3, -0.6);
            hand.rotation.set(0.2, 0.1, 0);
            handGroup.add(hand);
            viewScene.add(handGroup, new THREE.AmbientLight(0xffffff, 1));

            player = new Player();

            // Build a small floor
            for (let x = -5; x < 5; x++) {
                for (let z = -5; z < 5; z++) {
                    const box = new THREE.Mesh(
                        new THREE.BoxGeometry(1, 1, 1),
                        new THREE.MeshLambertMaterial({ color: 0x555555 })
                    );
                    box.position.set(x, -0.5, z);
                    scene.add(box);
                    blocks.push(box);
                }
            }

            // Spawn one NPC
            createNPC(3, 0, -3, 0x00ff00);

            // Controls
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if (e.code === 'Space' && player.onGround) {
                    player.vel.y = JUMP_FORCE;
                    player.onGround = false;
                }
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                viewCamera.aspect = window.innerWidth / window.innerHeight;
                viewCamera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            document.addEventListener('click', () => {
                document.body.requestPointerLock();
                handSwing = 1;
                performInteraction();
            });
            document.addEventListener('mousemove', e => {
                if (document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
                    camera.rotation.set(pitch, yaw, 0, 'YXZ');
                }
            });

            animate();
        }

        function performInteraction() {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = ray.intersectObjects(blocks);
            if (hits.length > 0 && hits[0].distance <= REACH) {
                console.log("Hit block at distance:", hits[0].distance);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            player.update(dt);

            // Hand swing animation
            if (handSwing > 0) {
                handSwing -= dt * 5;
                handGroup.rotation.x = -Math.sin(handSwing * Math.PI) * 0.8;
            }

            // Dual render pass
            renderer.autoClear = true;
            renderer.render(scene, camera);
            renderer.autoClear = false;
            renderer.clearDepth();
            renderer.render(viewScene, viewCamera);
        }

        init();
    </script>
</body>
</html>
